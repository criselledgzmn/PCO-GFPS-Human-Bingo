<!DOCTYPE html>
<html>
<head>
  <title>GFPS Human Bingo</title>
</head>
<body style="background-color: #f7d6ff; text-align: center; font-family: sans-serif; padding: 20px;">

  <h1>GFPS Human Bingo</h1>

  <!-- New Link Section -->
  <p style="font-size: 1.2rem; font-weight: bold;">
    Click this link to <a href="" id="download-link" download="bingo-card.png">download the bingo card</a> below and print.
  </p>

  <!-- The Bingo Card Image -->
  <img id="random-image" src="" alt="GFPS Human Bingo" style="max-width: 100%; height: auto; border: 2px solid #333; border-radius: 8px;">

  <script>
    // Logic to set the image source and the download link
    const images = ["3.png", "4.png", "5.png", "6.png", "7.png", "8.png", "9.png", "10.png", "11.png", "12.png", "13.png", "14.png", "15.png", "16.png", "17.png", "18.png", "19.png", "20.png", "21.png", "22.png"]; // Add your image filenames here

    const imgElement = document.getElementById('random-image');
    const linkElement = document.getElementById('download-link');

    // Update both the image display and the download link destination
    imgElement.src = randomImage;
    linkElement.href = randomImage;

</body>
